<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <link rel="stylesheet" href="/style/styles.css">
</head>
<body>
    <main class="game">
        <header class="game__header">
            <h1>2048</h1>

            <section class="score">
                <p>Score: <span id="score">0</span></p>
                <p>Best: <span id="best-score">0</span></p>
            </section>

            <section class="controls">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>

                <label for="theme">Theme:</label>
                <select id="theme">
                    <option value="light" selected>Light</option>
                    <option value="dark">Dark</option>
                </select>
            </section>
        </header>

        <section id="game-board" class="board"></section>

        <section id="game-over" class="modal hidden">
            <p>Game Over!</p>
            <button id="restart-btn">Restart</button>
        </section>

        <section id="help-screen" class="modal hidden">
            <h2>How to Play</h2>
            <p>Use the arrow keys to move the tiles. Merge similar tiles to reach 2048!</p>
            <button id="close-help-btn">Close</button>
        </section>

        <button id="help-btn" class="help-button">Help</button>
    </main>
    <script src="/js/script.js"></script>
</body>
</html>
